<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05091a;margin:0;padding:0}
.wrap{position:relative;width:100%;height:320px;background:#05091a;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
canvas{position:absolute;inset:0;width:100%;height:100%}
.panels{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;pointer-events:none}
.panel{border-right:1px solid rgba(200,170,80,.12);display:flex;flex-direction:column;justify-content:flex-end;padding:16px 14px}
.panel:last-child{border-right:none}
.panel-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,170,80,.35);font-weight:500}
.panel-sub{font-size:11px;color:rgba(160,185,230,.25);margin-top:3px;line-height:1.4}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:10;pointer-events:none;text-align:center}
.series-tag{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(200,175,100,.55);margin-bottom:10px;font-weight:500}
.hai-guide{font-size:82px;font-weight:900;color:#ffffff;line-height:.9;letter-spacing:-2px;text-transform:uppercase;text-shadow:0 2px 40px rgba(0,0,0,.8)}
.divider-line{width:60px;height:1px;background:rgba(200,175,100,.35);margin:14px auto}
.sub-title{font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:#e8d5a3;font-weight:600;line-height:1.4}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <canvas id="c"></canvas>
  <div class="panels">
    <div class="panel">
      <div class="panel-label">Residential</div>
      <div class="panel-sub">New developments</div>
    </div>
    <div class="panel">
      <div class="panel-label">Secondary</div>
      <div class="panel-sub">Resale market</div>
    </div>
    <div class="panel">
      <div class="panel-label">Eligibility</div>
      <div class="panel-sub">Who qualifies</div>
    </div>
    <div class="panel">
      <div class="panel-label">Documents</div>
      <div class="panel-sub">What you need</div>
    </div>
  </div>
  <div class="overlay">
    <div class="series-tag">Shanghai Property Guide · Part 1</div>
    <div class="hai-guide">Hai Guide</div>
    <div class="divider-line"></div>
    <div class="sub-title">Can Foreigners Buy Property<br>in Shanghai?</div>
  </div>
</div>
<script>
(function(){
  const wrap=document.getElementById('wrap');
  const c=document.getElementById('c');
  const ctx=c.getContext('2d');
  let W,H,t=0;
  let mouse={x:-1,y:-1};
  const bldgs=[
    {x:0,w:36,h:110,win:[[6,20],[6,35],[6,50],[6,65],[6,80],[20,20],[20,35],[20,50],[20,65],[20,80]]},
    {x:34,w:24,h:75,win:[[5,15],[5,28],[5,41],[5,54],[14,15],[14,28],[14,41]]},
    {x:56,w:52,h:140,win:[[7,22],[7,37],[7,52],[7,67],[7,82],[7,97],[7,112],[25,22],[25,37],[25,52],[25,67],[25,82],[25,97],[25,112],[40,22],[40,37],[40,52],[40,67]]},
    {x:106,w:20,h:85,win:[[4,16],[4,29],[4,42],[4,55],[4,68],[12,16],[12,29],[12,42],[12,55]]},
    {x:124,w:44,h:170,peak:true,sphere:true,win:[[7,42],[7,57],[7,72],[7,87],[7,102],[7,117],[7,132],[22,42],[22,57],[22,72],[22,87],[22,102],[22,117],[22,132],[35,42],[35,57],[35,72],[35,87]]},
    {x:166,w:32,h:100,win:[[6,18],[6,32],[6,46],[6,60],[6,74],[6,88],[18,18],[18,32],[18,46],[18,60],[18,74],[18,88]]},
    {x:196,w:48,h:130,win:[[7,20],[7,35],[7,50],[7,65],[7,80],[7,95],[7,110],[24,20],[24,35],[24,50],[24,65],[24,80],[24,95],[24,110],[38,20],[38,35],[38,50]]},
    {x:242,w:26,h:78,win:[[5,14],[5,27],[5,40],[5,53],[5,66],[15,14],[15,27],[15,40],[15,53]]},
    {x:266,w:56,h:155,peak:true,win:[[8,25],[8,40],[8,55],[8,70],[8,85],[8,100],[8,115],[8,130],[28,25],[28,40],[28,55],[28,70],[28,85],[28,100],[28,115],[28,130],[44,25],[44,40],[44,55],[44,70]]},
    {x:320,w:30,h:88,win:[[5,16],[5,29],[5,42],[5,55],[5,68],[17,16],[17,29],[17,42],[17,55]]},
    {x:348,w:42,h:118,win:[[6,20],[6,34],[6,48],[6,62],[6,76],[6,90],[6,104],[20,20],[20,34],[20,48],[20,62],[20,76],[20,90],[20,104],[33,20],[33,34],[33,48]]},
    {x:388,w:22,h:65,win:[[4,13],[4,26],[4,39],[4,52],[13,13],[13,26],[13,39]]},
    {x:408,w:60,h:145,peak:true,sphere:true,win:[[8,35],[8,50],[8,65],[8,80],[8,95],[8,110],[8,125],[30,35],[30,50],[30,65],[30,80],[30,95],[30,110],[30,125],[48,35],[48,50],[48,65],[48,80]]},
    {x:466,w:34,h:92,win:[[6,17],[6,31],[6,45],[6,59],[6,73],[19,17],[19,31],[19,45],[19,59]]},
    {x:498,w:50,h:125,win:[[7,20],[7,35],[7,50],[7,65],[7,80],[7,95],[7,110],[24,20],[24,35],[24,50],[24,65],[24,80],[24,95],[24,110],[40,20],[40,35]]},
    {x:546,w:28,h:72,win:[[5,14],[5,27],[5,40],[5,53],[5,66],[16,14],[16,27],[16,40],[16,53]]},
    {x:572,w:44,h:105,win:[[6,18],[6,32],[6,46],[6,60],[6,74],[6,88],[22,18],[22,32],[22,46],[22,60],[22,74],[22,88],[35,18],[35,32]]},
    {x:614,w:32,h:82,win:[[5,15],[5,28],[5,41],[5,54],[5,67],[18,15],[18,28],[18,41],[18,54]]},
    {x:644,w:36,h:95,win:[[6,17],[6,30],[6,43],[6,56],[6,69],[6,82],[20,17],[20,30],[20,43],[20,56],[20,69]]},
    {x:678,w:50,h:68,win:[[6,13],[6,26],[6,39],[6,52],[20,13],[20,26],[20,39],[20,52]]},
  ];
  function resize(){W=wrap.offsetWidth;H=wrap.offsetHeight;c.width=W;c.height=H;}
  function draw(){
    t+=0.016;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#05091a';ctx.fillRect(0,0,W,H);
    for(let i=0;i<70;i++){
      const sx=(i*197.3)%W,sy=(i*113.1)%(H*0.75);
      const tw=0.08+0.18*Math.abs(Math.sin(t*0.35+i*1.7));
      ctx.beginPath();ctx.arc(sx,sy,0.6,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,215,255,${tw})`;ctx.fill();
    }
    const base=H;
    for(const b of bldgs){
      const bx=b.x*(W/728),by=base-b.h*(H/320),bw=b.w*(W/728),bh=b.h*(H/320);
      ctx.fillStyle='#0b1220';ctx.fillRect(bx,by,bw,bh);
      if(b.peak){
        ctx.beginPath();
        ctx.moveTo(bx,by);ctx.lineTo(bx+bw/2,by-14*(H/320));ctx.lineTo(bx+bw,by);
        ctx.closePath();ctx.fillStyle='#0b1220';ctx.fill();
      }
      if(b.sphere){
        const cx2=bx+bw/2,cy1=by-14*(H/320),cy2=by-28*(H/320);
        ctx.beginPath();ctx.arc(cx2,cy1,9*(H/320),0,Math.PI*2);
        ctx.fillStyle='#0e1830';ctx.fill();
        ctx.strokeStyle='rgba(100,140,200,0.15)';ctx.lineWidth=0.5;ctx.stroke();
        ctx.beginPath();ctx.arc(cx2,cy2,7*(H/320),0,Math.PI*2);
        ctx.fillStyle='#0e1830';ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx2,cy1-9*(H/320));ctx.lineTo(cx2,cy2+7*(H/320));
        ctx.strokeStyle='rgba(100,140,200,0.2)';ctx.lineWidth=0.8;ctx.stroke();
      }
      ctx.strokeStyle='rgba(100,140,200,0.05)';ctx.lineWidth=0.5;
      ctx.strokeRect(bx,by,bw,bh);
      for(const w of b.win){
        const wx=bx+w[0]*(W/728),wy=by+w[1]*(H/320);
        const dist=mouse.x>0?Math.hypot(mouse.x-(wx+4),mouse.y-(wy+3)):999;
        const glow=dist<80?Math.max(0,(80-dist)/80):0;
        const base2=0.08+0.15*Math.abs(Math.sin(t*0.018+w[0]*0.1+w[1]*0.07+b.x*0.005));
        const alpha=Math.min(0.95,base2+glow*0.8);
        ctx.fillStyle=glow>0.3?`rgba(255,215,120,${alpha})`:`rgba(200,220,255,${alpha*0.8})`;
        ctx.fillRect(wx,wy,6*(W/728),4*(H/320));
      }
    }
    const fog=ctx.createLinearGradient(0,H*0.45,0,H);
    fog.addColorStop(0,'rgba(5,9,26,0)');
    fog.addColorStop(1,'rgba(5,9,26,0.65)');
    ctx.fillStyle=fog;ctx.fillRect(0,0,W,H);
    requestAnimationFrame(draw);
  }
  wrap.addEventListener('mousemove',function(e){
    const r=wrap.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
  });
  wrap.addEventListener('mouseleave',function(){mouse.x=-1;mouse.y=-1;});
  resize();draw();
})();
</script>
</body>
</html>
